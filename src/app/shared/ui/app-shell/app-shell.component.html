<div class="app-shell" [class.app-shell--menu-open]="mobileOpen()" [class.app-shell--collapsed]="collapsed()">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <span class="brand__mark">T</span>
      <div class="brand__text">
        <p class="brand__title">Trackademy</p>
        <p class="brand__subtitle">Panel academico</p>
      </div>
    </div>

    <nav class="sidebar__nav">
      @for (item of navItems; track item.route) {
        <a class="nav-link" [routerLink]="item.route" routerLinkActive="is-active" [title]="item.title" (click)="closeMobile()">
          <span class="nav-link__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path [attr.d]="item.icon"></path>
            </svg>
          </span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar__footer">
      <button class="nav-cta" type="button" (click)="signOut()" aria-label="Cerrar sesion" title="Cerrar sesion">
        <span class="nav-cta__icon">⇠</span>
        <span class="nav-cta__label">Cerrar sesion</span>
      </button>
    </div>
  </aside>

  <div class="app-shell__main">
    <header class="topbar">
      <button class="icon-button" type="button" (click)="toggleMenu()" aria-label="Abrir menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="topbar__spacer"></div>
      <div class="topbar__actions">
        <button class="topbar__secondary" type="button" (click)="signOut()">Cerrar sesion</button>
      </div>
    </header>
    <div class="app-shell__content">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>

@if (mobileOpen()) {
  <div class="scrim" (click)="closeMobile()"></div>
}
