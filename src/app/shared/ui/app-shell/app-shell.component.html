<div class="app-shell" [class.app-shell--menu-open]="mobileOpen()" [class.app-shell--collapsed]="collapsed()">
  <aside class="sidebar">
    <button
      class="sidebar__edge-toggle"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-label]="collapsed() ? 'Expandir menu lateral' : 'Contraer menu lateral'"
      [title]="collapsed() ? 'Expandir' : 'Contraer'"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        @if (!collapsed()) {
          <path d="M15 6l-6 6 6 6"></path>
        } @else {
          <path d="M9 6l6 6-6 6"></path>
        }
      </svg>
    </button>

    <div class="sidebar__brand">
      <span class="brand__mark">T</span>
      <div class="brand__text">
        <p class="brand__title">trackademy</p>
      </div>
    </div>

    <nav class="sidebar__nav">
      @for (item of navItems; track item.route) {
        <a class="nav-link" [routerLink]="item.route" routerLinkActive="is-active" [title]="item.title" (click)="closeMobile()">
          <span class="nav-link__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path [attr.d]="item.icon"></path>
            </svg>
          </span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar__utility">
      <a class="nav-link nav-link--utility" routerLink="/app/perfil" routerLinkActive="is-active" title="Perfil" (click)="closeMobile()">
        <span class="nav-link__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
            <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6A1.7 1.7 0 0 0 10.4 3V3a2 2 0 1 1 4 0v.1A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.2.36.2.74.6 1 .3.2.7.4 1.1.4h.1a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.7.6Z"></path>
          </svg>
        </span>
        <span>Perfil</span>
      </a>
      <button class="sidebar__signout" type="button" (click)="signOut()" aria-label="Cerrar sesion" title="Cerrar sesion">
        <span class="sidebar__signout-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M14 7V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h5a2 2 0 0 0 2-2v-2"></path>
            <path d="M10 12h10"></path>
            <path d="M17 8l4 4-4 4"></path>
          </svg>
        </span>
        <span class="sidebar__signout-label">Cerrar sesion</span>
      </button>
    </div>
  </aside>

  <div class="app-shell__main">
    <header class="topbar">
      <button class="icon-button" type="button" (click)="toggleMenu()" aria-label="Abrir menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>
    <div class="app-shell__content">
      <router-outlet></router-outlet>
    </div>
  </div>

  <app-toast-outlet></app-toast-outlet>
</div>

@if (mobileOpen()) {
  <div class="scrim" (click)="closeMobile()"></div>
}
