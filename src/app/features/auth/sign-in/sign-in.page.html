<main class="sign-in">
  <section class="sign-in__panel">
    <a class="back-link" routerLink="/">Regresar</a>
    <p class="eyebrow">Acceso Seguro</p>
    <h1>Iniciar sesión</h1>
    <p class="subtitle">
      Accede a Trackademy para continuar con tu configuración académica.
    </p>

    <button type="button" class="ms-btn" (click)="signInWithMicrosoft()">
      <span class="ms-logo" aria-hidden="true">M</span>
      Iniciar sesión
    </button>

    <p class="help-text">Métodos adicionales de autenticación podrán agregarse en una fase posterior.</p>
  </section>
</main>
