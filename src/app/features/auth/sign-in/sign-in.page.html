<main class="sign-in">
  <section class="sign-in__panel">
    <a class="back-link" routerLink="/">Regresar</a>
    <p class="eyebrow">Secure Access</p>
    <h1>Ingreso exclusivo con Microsoft</h1>
    <p class="subtitle">
      Trackademy utiliza autenticación corporativa para mantener un acceso seguro y consistente.
    </p>

    <button type="button" class="ms-btn" (click)="signInWithMicrosoft()">
      <span class="ms-logo" aria-hidden="true">M</span>
      Continuar con Microsoft
    </button>

    <p class="help-text">Google OAuth podrá agregarse en una fase posterior.</p>
  </section>
</main>
